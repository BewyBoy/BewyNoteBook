<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Resources Hub</title>
  <link rel="stylesheet" href="colors_and_type.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; overflow: hidden;
      background: #1E1B18; color: #FBF4E4;
      font-family: 'Times New Roman', Times, serif;
    }
    ::selection { background: #F2B544; color: #1E1B18; }

    :root {
      --pw: 360px;   /* page width  */
      --ph: 480px;   /* page height */
    }

    .scene {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    /* Whole book — base = closed; opening animated via Web Animations API. */
    .book {
      position: relative;
      width: calc(var(--pw) * 2);
      height: var(--ph);
      transform: translateX(-180px);
    }

    /* Pages */
    .left-page, .right-page {
      position: absolute; top: 0;
      width: var(--pw); height: var(--ph);
      background: #FBF4E4;
      overflow: hidden;
    }
    .right-page {
      left: var(--pw);
      border-radius: 2px 10px 10px 2px;
      box-shadow: inset 18px 0 38px -28px rgba(0,0,0,0.45);
    }
    .left-page {
      left: 0;
      border-radius: 10px 2px 2px 10px;
      box-shadow: inset -18px 0 38px -28px rgba(0,0,0,0.45);
      transform-origin: right center;
      transform: scaleX(0);
    }

    /* Page-edge stack illusion on the outer right */
    .page-stack {
      position: absolute; top: 6px; left: calc(var(--pw) * 2 - 3px);
      width: 12px; height: calc(var(--ph) - 12px);
      background: repeating-linear-gradient(to right, #FBF4E4 0 2px, #E4D8BC 2px 3px);
      border-radius: 0 6px 6px 0;
      z-index: 1;
    }

    /* Cover — base = shut over the right page. */
    .cover {
      position: absolute; top: 0; left: var(--pw);
      width: var(--pw); height: var(--ph);
      transform-origin: left center;
      transform: scaleX(1);
      border-radius: 4px 12px 12px 4px;
      overflow: hidden;
      z-index: 6;
      box-shadow: 12px 14px 0 rgba(0,0,0,0.22);
    }
    .cover-inner-wrap { width: 100%; height: 100%; }

    .fade-content { animation: fadeContent .5s ease .35s both; }
    @keyframes fadeContent {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bookmarks {
      position: absolute; top: 52px;
      left: calc(var(--pw) * 2 - 4px);
      display: flex; flex-direction: column; gap: 10px;
      z-index: 2;
    }

    .toc-scroll {
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-right: 4px;
      margin-right: -4px;
    }
    .toc-scroll::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    @media (max-height: 560px) { :root { --ph: 420px; } }

    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 9999;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(251,244,228,0.16);
      background: rgba(30,27,24,0.82);
      color: #FBF4E4;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .theme-toggle:hover { background: rgba(47,143,111,0.3); border-color: #2F8F6F; }

    body.light-mode #root {
      filter: invert(1) hue-rotate(180deg);
    }
    body.light-mode #root img,
    body.light-mode #root svg {
      filter: invert(1) hue-rotate(180deg);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button">☀ Light</button>
  <div id="root"></div>

  <script>
    (function () {
      const KEY = 'bewy-theme';
      const btn = document.getElementById('theme-toggle');
      const applyTheme = (mode) => {
        document.body.classList.toggle('light-mode', mode === 'light');
        if (btn) btn.textContent = mode === 'light' ? '🌙 Dark' : '☀ Light';
      };
      const saved = localStorage.getItem(KEY);
      applyTheme(saved === 'light' ? 'light' : 'dark');
      if (btn) {
        btn.addEventListener('click', () => {
          const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';
          localStorage.setItem(KEY, next);
          applyTheme(next);
        });
      }
    })();
  </script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "coverColor": "#C73C2E",
      "accentColor": "#F2B544"
    }/*EDITMODE-END*/;

    function useTweaksSafe(defaults) {
      if (typeof useTweaks === 'function') return useTweaks(defaults);
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((key, value) => {
        setValues(prev => ({ ...prev, [key]: value }));
      }, []);
      return [values, setTweak];
    }

    const SUBJECTS_BASE = [
      { id: 'math',      label: 'Math',      icon: 'π',  color: '#F2B544', deep: '#D89824',
        chapters: ['Algebra Fundamentals', 'Calculus I & II', 'Linear Algebra', 'Probability & Statistics', 'Discrete Mathematics'] },
      { id: 'physics',   label: 'Physics',   icon: '⚙',  color: '#6FB8D1', deep: '#3F8AAA',
        chapters: ['Classical Mechanics', 'Electromagnetism', 'Thermodynamics', 'Waves & Optics', 'Modern Physics'] },
      { id: 'chemistry', label: 'Chemistry', icon: '⚗',  color: '#2F8F6F', deep: '#1F6A52',
        chapters: ['Atomic Structure', 'Chemical Bonding', 'Organic Chemistry', 'Reaction Kinetics', 'Analytical Methods', 'Bond Types and Intermolecular Forces', 'Chemical Equations and Conservation', 'Laboratory Simulation Game'] },
      { id: 'biology',   label: 'Biology',   icon: '🧬',  color: '#D9633B', deep: '#B04A26',
        chapters: ['Cell Biology', 'Genetics & DNA', 'Human Anatomy', 'Ecology & Environment', 'Evolutionary Biology'] },
      { id: 'economics', label: 'Economics', icon: '📊',  color: '#E89BA8', deep: '#C76C7E',
        chapters: ['Microeconomics', 'Macroeconomics', 'International Trade', 'Financial Markets', 'Development Economics'] },
    ];

    const I18N = {
      vi: {
        langCode: 'VI',
        langSwitch: 'EN',
        brand: 'LR Hub',
        hint: 'Chọn tab để mở môn học →',
        closeBook: '← Đóng sách',
        coverTitle: 'Trung Tâm Tài Nguyên Học Tập',
        coverSub: 'Giáo trình · Tập 1',
        toc: 'Mục lục',
        startReading: 'Bắt đầu đọc →',
        openChapter: 'Mở chương {n} →',
        chaptersInside: 'chương bên trong',
        intro: 'Lộ trình học đầy đủ cho {subject} — từ nền tảng đến nâng cao, được sắp xếp theo từng chương.',
        tweaksTitle: 'Tinh chỉnh',
        tweaksCover: 'Bìa sách',
        tweaksAccent: 'Màu nhấn',
        tweaksColor: 'Màu',
      },
      en: {
        langCode: 'EN',
        langSwitch: 'VI',
        brand: 'LR Hub',
        hint: 'Pick a tab to open your subject →',
        closeBook: '← Close book',
        coverTitle: 'Learning Resources Hub',
        coverSub: 'Curriculum · Vol. 1',
        toc: 'Table of Contents',
        startReading: 'Start Reading →',
        openChapter: 'Open Chapter {n} →',
        chaptersInside: 'chapters inside',
        intro: 'A complete reading path through {subject} — from foundations to advanced topics, organized chapter by chapter.',
        tweaksTitle: 'Tweaks',
        tweaksCover: 'Cover',
        tweaksAccent: 'Accent',
        tweaksColor: 'Color',
      },
    };

    const SUBJECT_TRANSLATIONS = {
      vi: {
        math: {
          label: 'Toán học',
          chapters: ['Nền tảng Đại số', 'Giải tích I & II', 'Đại số tuyến tính', 'Xác suất & Thống kê', 'Toán rời rạc'],
        },
        physics: {
          label: 'Vật lý',
          chapters: ['Cơ học cổ điển', 'Điện từ học', 'Nhiệt động lực học', 'Sóng & Quang học', 'Vật lý hiện đại'],
        },
        chemistry: {
          label: 'Hóa học',
          chapters: ['Cấu trúc nguyên tử', 'Liên kết hóa học', 'Hóa hữu cơ', 'Động học phản ứng', 'Phương pháp phân tích', 'Các loại liên kết và tương tác phân tử', 'Phương trình hóa học và bảo toàn nguyên tố', 'Phòng thí nghiệm mô phỏng'],
        },
        biology: {
          label: 'Sinh học',
          chapters: ['Sinh học tế bào', 'Di truyền & DNA', 'Giải phẫu người', 'Sinh thái & Môi trường', 'Tiến hóa sinh học'],
        },
        economics: {
          label: 'Kinh tế học',
          chapters: ['Kinh tế vi mô', 'Kinh tế vĩ mô', 'Thương mại quốc tế', 'Thị trường tài chính', 'Kinh tế phát triển'],
        },
      },
    };

    function getSubjectsByLang(lang) {
      const dict = SUBJECT_TRANSLATIONS[lang];
      if (!dict) return SUBJECTS_BASE;
      return SUBJECTS_BASE.map((s) => {
        const tr = dict[s.id];
        if (!tr) return s;
        return { ...s, label: tr.label || s.label, chapters: tr.chapters || s.chapters };
      });
    }

    // Map chương đã có nội dung — bấm vào sẽ mở trang riêng.
    const CHAPTER_LINKS = {
      chemistry: {
        0: 'chuong-cau-truc-nguyen-tu.html',
        1: 'chuong-lien-ket-octet.html',
        5: 'chuong-cac-loai-lien-ket.html',
        6: 'chuong-phuong-trinh-hoa-hoc.html',
        7: 'chuong-phong-thi-nghiem.html',
      },
    };
    const hasChapterPage = (subjectId, chapterIndex) =>
      !!(CHAPTER_LINKS[subjectId] && CHAPTER_LINKS[subjectId][chapterIndex]);
    const openChapterPage = (subjectId, chapterIndex) => {
      const url = CHAPTER_LINKS[subjectId] && CHAPTER_LINKS[subjectId][chapterIndex];
      if (url) window.location.href = url;
    };

    function darken(hex) {
      const map = { '#C73C2E':'#9E2E22', '#2F8F6F':'#1F6A52', '#3A4A6B':'#28324A', '#5A4632':'#3E301F', '#F2B544':'#D89824' };
      return map[hex] || '#9E2E22';
    }

    /* ---- Bookmark tab (horizontal, on the book's fore-edge) ---- */
    function Bookmark({ subject, isOpen, isActive, onClick }) {
      const [hov, setHov] = React.useState(false);
      const poke = isActive ? 12 : hov ? 8 : 0;
      return (
        <button
          onClick={() => onClick(subject.id)}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            display: 'flex', alignItems: 'center', gap: 10,
            height: 46, padding: '0 18px 0 14px',
            background: subject.color,
            border: 'none',
            borderRadius: '0 12px 12px 0',
            cursor: 'pointer',
            transform: `translateX(${poke}px)`,
            transition: 'transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease',
            boxShadow: isActive
              ? `5px 4px 16px -4px ${subject.color}cc`
              : hov ? '3px 3px 10px -3px rgba(0,0,0,0.4)' : '2px 2px 6px -2px rgba(0,0,0,0.35)',
            outline: isActive ? `2px solid ${subject.deep}` : 'none',
            outlineOffset: -2,
            whiteSpace: 'nowrap',
          }}
        >
          <span style={{
            width: 26, height: 26, borderRadius: 7,
            background: 'rgba(0,0,0,0.12)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 15, flexShrink: 0,
          }}>{subject.icon}</span>
          <span style={{
            fontFamily: "'Times New Roman', Times, serif",
            fontSize: 14, fontWeight: isActive ? 700 : 600,
            color: '#1E1B18',
          }}>{subject.label}</span>
        </button>
      );
    }

    /* ---- Closed cover face ---- */
    function CoverFront({ coverColor, accentColor, t }) {
      const spine = darken(coverColor);
      return (
        <div className="cover-inner" style={{
          width: '100%', height: '100%', background: coverColor,
          display: 'flex', flexDirection: 'column', position: 'relative',
        }}>
          <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 30, background: spine }} />
          <div style={{ position: 'absolute', inset: 22, left: 44, border: `2px solid ${accentColor}55`, borderRadius: 6, pointerEvents: 'none' }} />
          <div style={{
            margin: '90px 36px 0 64px', padding: '26px 26px 22px',
            background: '#FBF4E4', borderRadius: 8, boxShadow: '0 8px 20px -8px rgba(0,0,0,0.4)',
          }}>
            <h1 style={{ fontFamily: "'Times New Roman', Times, serif", fontWeight: 700, fontSize: 38, lineHeight: 1, color: '#2A2520', margin: 0 }}>{t.coverTitle}</h1>
            <p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: 12, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#8A7E6C', margin: '10px 0 0' }}>{t.coverSub}</p>
          </div>
          <div style={{ marginTop: 'auto', marginBottom: 34, marginLeft: 64, display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: 9, background: accentColor, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="13" height="17" rx="2" fill="#1E1B18" opacity="0.25"/>
                <rect x="7" y="1" width="13" height="17" rx="2" fill="#1E1B18" opacity="0.65"/>
              </svg>
            </div>
            <span style={{ fontFamily: "'Times New Roman', Times, serif", fontWeight: 700, fontSize: 22, color: '#FBF4E4' }}>{t.brand}</span>
          </div>
        </div>
      );
    }

    /* ---- Left inside page — subject intro ---- */
    function LeftPage({ subject, t }) {
      return (
        <div key={subject.id} className="fade-content" style={{
          width: '100%', height: '100%', padding: '44px 40px',
          display: 'flex', flexDirection: 'column', color: '#2A2520',
        }}>
          <div style={{
            width: 64, height: 64, borderRadius: 16, background: subject.color,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32,
            boxShadow: `0 10px 24px -8px ${subject.color}88`,
          }}>{subject.icon}</div>
          <h2 style={{ fontFamily: "'Times New Roman', Times, serif", fontWeight: 700, fontSize: 52, lineHeight: 0.95, color: '#2A2520', margin: '26px 0 0' }}>{subject.label}</h2>
          <div style={{ width: 50, height: 4, borderRadius: 2, background: subject.color, margin: '18px 0 20px' }} />
          <p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: 15, lineHeight: 1.65, color: '#6B5F4E', margin: 0 }}>
            {t.intro.replace('{subject}', subject.label.toLowerCase())}
          </p>
          <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <span style={{ fontFamily: "'Times New Roman', Times, serif", fontWeight: 700, fontSize: 44, color: subject.color, lineHeight: 1 }}>{subject.chapters.length}</span>
            <span style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: 13, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#8A7E6C' }}>{t.chaptersInside}</span>
          </div>
        </div>
      );
    }

    /* ---- Right page — Table of Contents ---- */
    function TableOfContents({ subject, activeChapter, onSelectChapter, t }) {
      return (
        <div key={subject.id} className="fade-content" style={{
          width: '100%', height: '100%', padding: '44px 40px 36px',
          display: 'flex', flexDirection: 'column', color: '#2A2520',
        }}>
          <p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: 12, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#8A7E6C', margin: 0 }}>{t.toc}</p>
          <h3 style={{ fontFamily: "'Times New Roman', Times, serif", fontWeight: 700, fontSize: 34, color: '#2A2520', margin: '2px 0 0', lineHeight: 1 }}>{subject.label}</h3>
          <div style={{ margin: '18px 0 14px', height: 2, backgroundImage: 'repeating-linear-gradient(90deg, #D8CBAF 0 6px, transparent 6px 12px)' }} />
          <div className="toc-scroll" style={{ display: 'flex', flexDirection: 'column', flex: 1 }}>
            {subject.chapters.map((ch, i) => {
              const active = activeChapter === i;
              const hasPage = hasChapterPage(subject.id, i);
              return (
                <button key={i} onClick={() => {
                  onSelectChapter(i);
                  if (hasPage) openChapterPage(subject.id, i);
                }} style={{
                  display: 'flex', alignItems: 'center', gap: 14, padding: '11px 10px',
                  background: active ? subject.color + '22' : 'transparent',
                  border: 'none', borderRadius: 8, cursor: 'pointer', textAlign: 'left',
                  transition: 'all .18s ease', fontFamily: "'Times New Roman', Times, serif",
                }}
                  onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'rgba(0,0,0,0.04)'; }}
                  onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
                >
                  <span style={{
                    width: 30, height: 30, borderRadius: 8, flexShrink: 0,
                    background: active ? subject.color : '#EDE2C8',
                    color: active ? '#1E1B18' : '#9C8E73',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontWeight: 700, fontSize: 14, transition: 'all .18s ease',
                  }}>{i + 1}</span>
                  <span style={{ fontSize: 15, fontWeight: active ? 700 : 500, color: '#2A2520', flex: 1 }}>{ch}</span>
                  {hasPage
                    ? <span style={{ fontSize: 10, fontWeight: 700, color: subject.deep, background: subject.color + '33', padding: '3px 8px', borderRadius: 999, letterSpacing: '0.06em', textTransform: 'uppercase' }}>3D</span>
                    : <span style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: 14, color: '#B0A488' }}>{(i + 1) * 12}</span>}
                </button>
              );
            })}
          </div>
          <button onClick={() => {
            const idx = activeChapter == null ? 0 : activeChapter;
            if (hasChapterPage(subject.id, idx)) openChapterPage(subject.id, idx);
            else onSelectChapter(idx);
          }} style={{
            marginTop: 14, padding: '13px 0', background: subject.color, color: '#1E1B18',
            border: 'none', borderRadius: 10, cursor: 'pointer',
            fontFamily: "'Times New Roman', Times, serif", fontSize: 15, fontWeight: 700,
            boxShadow: `0 8px 20px -8px ${subject.color}`, transition: 'transform .15s ease',
          }}
            onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'}
            onMouseLeave={e => e.currentTarget.style.transform = 'none'}
          >
            {activeChapter == null ? t.startReading : t.openChapter.replace('{n}', activeChapter + 1)}
          </button>
        </div>
      );
    }

    /* ---- App ---- */
    function App() {
      const [tweaks, setTweak] = useTweaksSafe(TWEAK_DEFAULTS);
      const [lang, setLang] = React.useState('vi');
      const [open, setOpen] = React.useState(false);
      const [subjectId, setSubjectId] = React.useState(null);
      const [activeChapter, setActiveChapter] = React.useState(null);
      const hasTweaksUI = typeof TweaksPanel !== 'undefined'
        && typeof TweakSection !== 'undefined'
        && typeof TweakColor !== 'undefined';

      const t = I18N[lang] || I18N.en;
      const SUBJECTS = React.useMemo(() => getSubjectsByLang(lang), [lang]);

      const subject = SUBJECTS.find(s => s.id === subjectId) || SUBJECTS[0];

      const chooseBookmark = (id) => { setActiveChapter(null); setSubjectId(id); setOpen(true); };
      const closeBook = () => setOpen(false);

      // Imperative open/close animation (Web Animations API) — robust against
      // CSS-transition baseline quirks under React commits.
      const firstRun = React.useRef(true);
      React.useEffect(() => {
        const book  = document.querySelector('.book');
        const cover = document.querySelector('.cover');
        const lp    = document.querySelector('.left-page');
        const bm    = document.querySelector('.bookmarks');
        const inner = document.querySelector('.cover-inner-wrap');
        if (!book || !cover || !lp || !bm) return;
        const ease = 'cubic-bezier(.66,0,.2,1)';
        const opt = (d, delay) => ({ duration: d, delay: delay || 0, easing: ease, fill: 'both' });

        if (firstRun.current) {
          firstRun.current = false;
          if (!open) return; // nothing to animate on first paint (starts closed)
        }

        if (open) {
          book.animate([{ transform: 'translateX(-180px)' }, { transform: 'translateX(0px)' }], opt(1000));
          cover.animate([
            { transform: 'scaleX(1)', boxShadow: '12px 14px 0 rgba(0,0,0,0.22)' },
            { transform: 'scaleX(0)', boxShadow: '0 0 0 rgba(0,0,0,0)' },
          ], opt(550));
          if (inner) inner.animate([{ opacity: 1 }, { opacity: 0 }], opt(300, 40));
          lp.animate([{ transform: 'scaleX(0)' }, { transform: 'scaleX(1)' }], opt(550, 420));
        } else {
          book.animate([{ transform: 'translateX(0px)' }, { transform: 'translateX(-180px)' }], opt(900));
          lp.animate([{ transform: 'scaleX(1)' }, { transform: 'scaleX(0)' }], opt(360));
          cover.animate([
            { transform: 'scaleX(0)', boxShadow: '0 0 0 rgba(0,0,0,0)' },
            { transform: 'scaleX(1)', boxShadow: '12px 14px 0 rgba(0,0,0,0.22)' },
          ], opt(520, 260));
          if (inner) inner.animate([{ opacity: 0 }, { opacity: 1 }], opt(300, 420));
        }
      }, [open]);

      return (
        <div style={{ height: '100vh', position: 'relative', overflow: 'hidden', background: '#1E1B18' }}>
          {/* Ambient glow */}
          <div style={{
            position: 'absolute', top: '50%', left: '50%',
            width: '70vw', height: '70vw', transform: 'translate(-50%,-55%)',
            background: `radial-gradient(ellipse, ${(open ? subject.color : tweaks.accentColor)}12 0%, transparent 60%)`,
            pointerEvents: 'none', transition: 'background .8s ease',
          }} />

          {/* Top bar */}
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '22px 32px', zIndex: 20, pointerEvents: 'none',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 34, height: 34, borderRadius: 10, background: tweaks.accentColor, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="3" width="13" height="17" rx="2" fill="#1E1B18" opacity="0.25"/>
                  <rect x="7" y="1" width="13" height="17" rx="2" fill="#1E1B18" opacity="0.65"/>
                </svg>
              </div>
              <span style={{ fontFamily: "'Times New Roman', Times, serif", fontWeight: 700, fontSize: 22 }}>{t.brand}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, pointerEvents: 'auto' }}>
              <button onClick={() => setLang(prev => prev === 'vi' ? 'en' : 'vi')} style={{
                padding: '9px 14px', background: 'rgba(251,244,228,0.08)',
                border: '1px solid rgba(251,244,228,0.12)', borderRadius: 10,
                cursor: 'pointer', color: '#FBF4E4',
                fontFamily: "'Times New Roman', Times, serif", fontSize: 13, fontWeight: 700,
              }}>{t.langCode} | {t.langSwitch}</button>
              <button onClick={closeBook} style={{
                opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none',
                display: 'flex', alignItems: 'center', gap: 8, padding: '9px 18px',
                background: 'rgba(251,244,228,0.08)', border: '1px solid rgba(251,244,228,0.12)',
                borderRadius: 10, cursor: 'pointer', color: '#FBF4E4',
                fontFamily: "'Times New Roman', Times, serif", fontSize: 14, fontWeight: 600,
                transition: 'opacity .4s ease',
              }}>{t.closeBook}</button>
            </div>
          </div>

          {/* Hint */}
          <div style={{
            position: 'absolute', bottom: 48, left: 0, right: 0, textAlign: 'center', zIndex: 20,
            opacity: open ? 0 : 1, transition: 'opacity .5s ease', pointerEvents: 'none',
          }}>
            <p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: 26, color: 'rgba(251,244,228,0.55)', margin: 0 }}>{t.hint}</p>
          </div>

          {/* Scene */}
          <div className="scene">
            <div className="book">
              <div className="page-stack" />

              {/* Left page (subject intro) */}
              <div className="left-page">
                <LeftPage subject={subject} t={t} />
              </div>

              {/* Right page (TOC) */}
              <div className="right-page">
                <TableOfContents subject={subject} activeChapter={activeChapter} onSelectChapter={setActiveChapter} t={t} />
              </div>

              {/* Cover */}
              <div className="cover">
                <div className="cover-inner-wrap">
                  <CoverFront coverColor={tweaks.coverColor} accentColor={tweaks.accentColor} t={t} />
                </div>
              </div>

              {/* Bookmarks */}
              <div className="bookmarks">
                {SUBJECTS.map(s => (
                  <Bookmark key={s.id} subject={s} isOpen={open} isActive={open && s.id === subjectId} onClick={chooseBookmark} />
                ))}
              </div>
            </div>
          </div>

          {/* Render tweaks UI only when tweaks runtime is available. */}
          {hasTweaksUI && (
            <TweaksPanel title={t.tweaksTitle}>
              <TweakSection title={t.tweaksCover}>
                <TweakColor label={t.tweaksColor} value={tweaks.coverColor} onChange={v => setTweak('coverColor', v)}
                  options={['#C73C2E', '#2F8F6F', '#3A4A6B', '#5A4632']} />
              </TweakSection>
              <TweakSection title={t.tweaksAccent}>
                <TweakColor label={t.tweaksColor} value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)}
                  options={['#F2B544', '#D9633B', '#6FB8D1', '#E89BA8']} />
              </TweakSection>
            </TweaksPanel>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
