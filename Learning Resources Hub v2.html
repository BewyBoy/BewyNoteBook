<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Resources Hub</title>
  <link rel="stylesheet" href="colors_and_type.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #1E1B18;
      color: #FBF4E4;
    }

    @keyframes flatFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes flatPopIn {
      from { opacity: 0; transform: scale(0.92) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    /* Entrance transition via class */
    .enter-ready {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .enter-ready.entered {
      opacity: 1; transform: translateY(0);
    }
    .enter-d1 { transition-delay: 0.05s; }
    .enter-d2 { transition-delay: 0.12s; }
    .enter-d3 { transition-delay: 0.2s; }
    .enter-d4 { transition-delay: 0.28s; }
    @keyframes bookFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1E1B18; }
    ::-webkit-scrollbar-thumb { background: rgba(251,244,228,0.1); border-radius: 4px; }

    /* Selection */
    ::selection { background: #F2B544; color: #1E1B18; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components-v2.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "bookColor": "#C73C2E",
      "accentColor": "#F2B544",
      "showGrid": false,
      "bookSize": 260
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [activeSubject, setActiveSubject] = React.useState('math');
      const [modalSubject, setModalSubject] = React.useState(null);
      const [loaded, setLoaded] = React.useState(false);

      React.useEffect(() => { setTimeout(() => setLoaded(true), 80); }, []);

      const activeS = SUBJECTS_V2.find(s => s.id === activeSubject) || SUBJECTS_V2[0];

      return (
        <div style={{ minHeight: '100vh', background: FLAT.dark, position: 'relative', overflow: 'hidden' }}>

          {/* Optional grid underlay */}
          {tweaks.showGrid && <div style={{
            position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0,
            backgroundImage: `
              linear-gradient(rgba(251,244,228,0.03) 1px, transparent 1px),
              linear-gradient(90deg, rgba(251,244,228,0.03) 1px, transparent 1px)`,
            backgroundSize: '48px 48px',
          }} />}

          {/* Subtle radial glow behind hero */}
          <div style={{
            position: 'fixed', top: '-20%', right: '-10%',
            width: '60vw', height: '60vw',
            background: `radial-gradient(ellipse, ${tweaks.accentColor}08 0%, transparent 70%)`,
            pointerEvents: 'none', zIndex: 0,
          }} />

          {/* ===== NAVBAR ===== */}
          <nav style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '18px 40px',
            position: 'relative', zIndex: 10,
            borderBottom: '1px solid rgba(251,244,228,0.06)',
          }}
            className={`enter-ready ${loaded ? 'entered' : ''}`}
          >
            <FlatBrand />
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              {['Home', 'Chapters', 'About'].map((link, i) => (
                <a key={link} href="#" onClick={e => e.preventDefault()} style={{
                  fontFamily: "'Times New Roman', Times, serif",
                  fontSize: 14, fontWeight: i === 0 ? 600 : 400,
                  color: i === 0 ? FLAT.cream : 'rgba(251,244,228,0.4)',
                  textDecoration: 'none',
                  padding: '8px 16px',
                  borderRadius: 10,
                  background: i === 0 ? 'rgba(251,244,228,0.06)' : 'transparent',
                  transition: 'all 0.15s ease',
                }}>{link}</a>
              ))}
            </div>
          </nav>

          {/* ===== HERO SECTION ===== */}
          <section style={{
            maxWidth: 1100, margin: '0 auto',
            padding: '64px 40px 40px',
            display: 'grid',
            gridTemplateColumns: '1fr 1fr',
            gap: 60, alignItems: 'center',
            position: 'relative', zIndex: 1,
          }} className={`enter-ready enter-d1 ${loaded ? 'entered' : ''}`}>
            {/* Left: Text content */}
            <div>
              <div style={{
                display: 'inline-flex', alignItems: 'center', gap: 8,
                padding: '6px 14px 6px 8px',
                background: `${tweaks.accentColor}18`,
                borderRadius: 20,
                marginBottom: 24,
              }}>
                <span style={{
                  width: 22, height: 22, borderRadius: 6,
                  background: tweaks.accentColor,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 12,
                }}>📖</span>
                <span style={{
                  fontFamily: "'Times New Roman', Times, serif",
                  fontSize: 13, fontWeight: 600,
                  color: tweaks.accentColor,
                }}>Curriculum Chapters</span>
              </div>

              <h1 style={{
                fontFamily: "'Times New Roman', Times, serif", fontWeight: 700,
                fontSize: 'clamp(42px, 6vw, 64px)',
                lineHeight: 0.95, color: FLAT.cream,
                margin: '0 0 20px',
                letterSpacing: '-0.02em',
              }}>
                Learning<br/>Resources Hub
              </h1>

              <p style={{
                fontFamily: "'Times New Roman', Times, serif",
                fontSize: 17, lineHeight: 1.6,
                color: 'rgba(251,244,228,0.5)',
                margin: '0 0 36px', maxWidth: 420,
              }}>
                Browse curated chapters across core subjects — real textbook insights, clear explanations, and structured learning paths.
              </p>

              {/* CTA buttons */}
              <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginBottom: 48 }}>
                <FlatButton primary color={tweaks.accentColor} onClick={() => setModalSubject(activeSubject)}>
                  Explore Chapters
                </FlatButton>
                <FlatButton onClick={() => {}}>
                  Download Syllabus
                </FlatButton>
              </div>

              {/* Stats row */}
              <div style={{
                display: 'flex', gap: 40,
              }}>
                {[
                  { num: '5', label: 'Subjects' },
                  { num: '25+', label: 'Chapters' },
                  { num: '100+', label: 'Topics' },
                ].map((stat, i) => (
                  <div key={i}>
                    <div style={{
                      fontFamily: "'Times New Roman', Times, serif",
                      fontSize: 32, fontWeight: 700,
                      color: i === 0 ? tweaks.accentColor : FLAT.cream,
                    }}>{stat.num}</div>
                    <div style={{
                      fontFamily: "'Times New Roman', Times, serif",
                      fontSize: 13, color: 'rgba(251,244,228,0.35)',
                    }}>{stat.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Right: Book + Long Shadow Card */}
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              position: 'relative',
            }}>
              {/* Gold background card with rounded corners */}
              <div style={{
                position: 'relative',
                background: tweaks.accentColor,
                borderRadius: 28,
                width: tweaks.bookSize + 120,
                height: tweaks.bookSize * 1.15 + 100,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                overflow: 'hidden',
              }}>
                {/* Long shadow */}
                <div style={{
                  position: 'absolute',
                  top: '50%', left: '50%',
                  width: '150%', height: '150%',
                  background: 'linear-gradient(135deg, transparent 40%, rgba(0,0,0,0.12) 40%, rgba(0,0,0,0.12) 41%, transparent 41%)',
                  transform: 'translate(-30%, -30%)',
                  pointerEvents: 'none',
                }} />

                {/* The flat book */}
                <div style={{
                  position: 'relative', zIndex: 2,
                  animation: 'bookFloat 4s ease-in-out infinite',
                  filter: `drop-shadow(8px 8px 0 rgba(0,0,0,0.15))`,
                }}>
                  <FlatBook
                    color={tweaks.bookColor}
                    bookmarkColor={
                      tweaks.bookColor === '#C73C2E' ? '#9E2E22' :
                      tweaks.bookColor === '#2F8F6F' ? '#1F6A52' :
                      tweaks.bookColor === '#6FB8D1' ? '#3F8AAA' :
                      tweaks.bookColor === '#D9633B' ? '#B04A26' : '#9E2E22'
                    }
                    size={tweaks.bookSize}
                  />
                </div>
              </div>
            </div>
          </section>

          {/* ===== SUBJECT TABS SECTION ===== */}
          <section style={{
            maxWidth: 1100, margin: '0 auto',
            padding: '0 40px 40px',
            position: 'relative', zIndex: 1,
          }} className={`enter-ready enter-d2 ${loaded ? 'entered' : ''}`}>
            <div style={{
              display: 'flex', alignItems: 'flex-start', gap: 32,
            }}>
              {/* Tabs column */}
              <div style={{
                display: 'flex', flexDirection: 'column', gap: 6,
                width: 220, flexShrink: 0,
              }}>
                <div style={{
                  fontFamily: "'Times New Roman', Times, serif",
                  fontSize: 14, color: 'rgba(251,244,228,0.3)',
                  textTransform: 'uppercase', letterSpacing: '0.08em',
                  padding: '0 0 10px 22px',
                }}>Subjects</div>
                {SUBJECTS_V2.map((s, i) => (
                  <FlatTab key={s.id} subject={s} active={activeSubject}
                    onClick={(id) => { setActiveSubject(id); }}
                    index={i} />
                ))}
              </div>

              {/* Active subject detail card */}
              <div style={{
                flex: 1, minWidth: 0,
                background: 'rgba(251,244,228,0.03)',
                borderRadius: 20,
                border: '1px solid rgba(251,244,228,0.06)',
                padding: 32,
                transition: 'all 0.3s ease',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 16 }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: 12,
                    background: activeS.color,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 22,
                    boxShadow: `0 8px 20px -6px ${activeS.color}55`,
                  }}>{activeS.icon}</div>
                  <div>
                    <h3 style={{
                      fontFamily: "'Times New Roman', Times, serif", fontSize: 26, fontWeight: 700,
                      color: FLAT.cream, margin: 0,
                    }}>{activeS.label}</h3>
                    <p style={{
                      fontFamily: "'Times New Roman', Times, serif",
                      fontSize: 13, color: 'rgba(251,244,228,0.4)', margin: 0,
                    }}>5 chapters available</p>
                  </div>
                  <FlatButton primary color={activeS.color}
                    onClick={() => setModalSubject(activeSubject)}>
                    View All →
                  </FlatButton>
                </div>
                <p style={{
                  fontFamily: "'Times New Roman', Times, serif",
                  fontSize: 15, lineHeight: 1.6,
                  color: 'rgba(251,244,228,0.5)', margin: 0,
                }}>{activeS.desc}</p>
              </div>
            </div>
          </section>

          {/* ===== FEATURES GRID ===== */}
          <section style={{
            maxWidth: 1100, margin: '0 auto',
            padding: '40px 40px 80px',
            position: 'relative', zIndex: 1,
          }} className={`enter-ready enter-d3 ${loaded ? 'entered' : ''}`}>
            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(4, 1fr)',
              gap: 16,
            }}>
              <FlatFeatureCard icon="📖" title="Real textbook insights"
                desc="Curated from leading academic sources"
                color={FLAT.gold} />
              <FlatFeatureCard icon="🧪" title="Chemistry & reactions"
                desc="Organic, inorganic & analytical"
                color={FLAT.jade} />
              <FlatFeatureCard icon="🧬" title="Biology & biosphere"
                desc="Cell biology to ecology"
                color={FLAT.terracotta} />
              <FlatFeatureCard icon="📈" title="Economics fundamentals"
                desc="Micro, macro & development"
                color={FLAT.lotus} />
            </div>
          </section>

          {/* ===== FOOTER ===== */}
          <footer style={{
            maxWidth: 1100, margin: '0 auto',
            padding: '24px 40px 40px',
            borderTop: '1px solid rgba(251,244,228,0.06)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            position: 'relative', zIndex: 1,
          }}>
            <p style={{
              fontFamily: "'Times New Roman', Times, serif",
              fontSize: 13, color: 'rgba(251,244,228,0.25)', margin: 0,
            }}>
              Flat design notebook — one chapter at a time.
            </p>
            <FlatBrand />
          </footer>

          {/* Modal */}
          <FlatModal subject={modalSubject} onClose={() => setModalSubject(null)} />

          {/* ---- Tweaks Panel ---- */}
          <TweaksPanel title="Tweaks">
            <TweakSection title="Book">
              <TweakColor
                label="Cover Color"
                value={tweaks.bookColor}
                onChange={v => setTweak('bookColor', v)}
                options={['#C73C2E', '#2F8F6F', '#6FB8D1', '#D9633B']}
              />
              <TweakSlider
                label="Book Size"
                value={tweaks.bookSize}
                onChange={v => setTweak('bookSize', v)}
                min={180} max={340} step={10}
              />
            </TweakSection>
            <TweakSection title="Accent">
              <TweakColor
                label="Accent Color"
                value={tweaks.accentColor}
                onChange={v => setTweak('accentColor', v)}
                options={['#F2B544', '#D9633B', '#6FB8D1', '#E89BA8']}
              />
            </TweakSection>
            <TweakSection title="Extras">
              <TweakToggle
                label="Grid overlay"
                value={tweaks.showGrid}
                onChange={v => setTweak('showGrid', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
